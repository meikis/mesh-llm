name: PR Quality Checks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CACHE_NAMESPACE: mesh-llm
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      affected_crates: ${{ steps.compute.outputs.affected_crates }}
      test_crates: ${{ steps.compute.outputs.test_crates }}
      batches_json: ${{ steps.compute.outputs.batches_json }}
      clippy_batches_json: ${{ steps.compute.outputs.clippy_batches_json }}
      all_rust: ${{ steps.compute.outputs.all_rust }}
      ui_changed: ${{ steps.compute.outputs.ui_changed }}
      website_docs_changed: ${{ steps.compute.outputs.website_docs_changed }}
      cli_surface_changed: ${{ steps.compute.outputs.cli_surface_changed }}
      docs_only: ${{ steps.compute.outputs.docs_only }}
      rust_changed: ${{ steps.compute.outputs.rust_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check CI crate-list drift
        run: cargo run -p xtask -- repo-consistency ci-crate-lists
      - name: Check publish crate-chain drift
        run: cargo run -p xtask -- repo-consistency publish-crates
      - uses: ./.github/actions/compute-changes
        id: compute
        with:
          event_name: ${{ github.event_name }}
          base_sha: ${{ github.event.pull_request.base.sha || '' }}
          head_sha: ${{ github.event.pull_request.head.sha || '' }}

  rust-fmt:
    needs: changes
    if: needs.changes.outputs.rust_changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  rust-clippy:
    needs: changes
    if: needs.changes.outputs.rust_changed == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.changes.outputs.clippy_batches_json) }}
    name: rust-clippy (${{ matrix.batch.idx }})
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev lld
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: . -> target
          cache-bin: "false"
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: pr-clippy
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run clippy
        env:
          CLIPPY_CRATES: ${{ toJson(matrix.batch.crates) }}
        run: |
          CRATES=$(jq -r '.[]' <<<"$CLIPPY_CRATES")
          if [[ -z "$CRATES" ]]; then
            echo "Batch ${{ matrix.batch.idx }}: no crates to check"
            exit 0
          fi
          echo "Batch ${{ matrix.batch.idx }} crates: $CRATES"
          for CRATE in $CRATES; do
            # skippy-ffi requires llama.cpp ABI build — skip in quality-only workflow
            if [[ "$CRATE" == "skippy-ffi" ]]; then
              echo "Skipping skippy-ffi: requires llama.cpp ABI build (not available in PR Quality Checks)"
              continue
            fi
            cargo clippy -p "$CRATE" --all-targets -- -D warnings
          done
      - name: Show sccache stats
        if: ${{ always() }}
        run: |
          sccache --show-stats || true
          requests="$(sccache --show-stats 2>/dev/null | awk '/Compile requests/ { print $3; exit }')"
          if [ "${requests:-0}" = "0" ]; then
            echo "::warning::sccache reported zero compile requests; check RUSTC_WRAPPER wiring if this was not a fully reused target cache."
          fi

  ui-quality:
    needs: changes
    if: needs.changes.outputs.ui_changed == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: crates/mesh-llm-ui
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: crates/mesh-llm-ui/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm run typecheck
      - name: Test
        run: pnpm test

  cli-docs-sync:
    needs: changes
    if: needs.changes.outputs.cli_surface_changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Require public website docs update
        env:
          WEBSITE_DOCS_CHANGED: ${{ needs.changes.outputs.website_docs_changed }}
        run: |
          if [[ "$WEBSITE_DOCS_CHANGED" != "true" ]]; then
            cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## CLI documentation sync failed

          Rust CLI definition files changed, but no public website docs or command examples changed.

          Update at least one relevant file under:

          - `website/src/docs/pages/`
          - `website/src/_includes/`

          The primary CLI reference is `website/src/docs/pages/CLI.md`.
          EOF
            echo "ERROR: Rust CLI surface changed without a public website docs/example update." >&2
            exit 1
          fi

          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## CLI documentation sync passed

          Rust CLI definition files changed and public website docs/examples were updated in this PR.
          EOF

  summary:
    needs: [changes, rust-fmt, rust-clippy, ui-quality, cli-docs-sync]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check quality gate
        env:
          CHANGES: ${{ needs.changes.result }}
          FMT: ${{ needs.rust-fmt.result }}
          CLIPPY: ${{ needs.rust-clippy.result }}
          UI: ${{ needs.ui-quality.result }}
          CLI_DOCS: ${{ needs.cli-docs-sync.result }}
        run: |
          {
            echo "## PR Quality Checks"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            printf '| %s | %s |\n' "changes" "$CHANGES"
            printf '| %s | %s |\n' "rust-fmt" "$FMT"
            printf '| %s | %s |\n' "rust-clippy" "$CLIPPY"
            printf '| %s | %s |\n' "ui-quality" "$UI"
            printf '| %s | %s |\n' "cli-docs-sync" "$CLI_DOCS"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=false
          for STATUS in "$CHANGES" "$FMT" "$CLIPPY" "$UI" "$CLI_DOCS"; do
            if [[ "$STATUS" == "failure" || "$STATUS" == "cancelled" ]]; then
              FAILED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "ERROR: One or more quality checks failed." >&2
            exit 1
          fi
