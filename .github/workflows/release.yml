            --target x86_64-pc-windows-msvc \
            --out dist/native-runtimes
      - name: Verify native runtime artifact
        shell: bash
        run: scripts/verify-native-runtime-package.sh dist/native-runtimes/*.tar.gz
      - name: Upload native runtime
        uses: actions/upload-artifact@v6
        with:
          name: release-native-runtime-windows-x86_64-cpu
          path: |
            dist/native-runtimes/*.tar.gz
            dist/native-runtimes/*.sha256
          if-no-files-found: error

  build_native_runtime_windows_gpu:
    name: Build native runtime Windows x86_64 ${{ matrix.name }}
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: windows-2022
    env:
      ROCM_HIP_SDK_FILENAME: AMD-Software-PRO-Edition-25.Q3-WinSvr2022-For-HIP.exe
      WINDOWS_CUDA_VERSION: ${{ vars.CUDA_VERSION || '12.9.2' }}
      MESH_NATIVE_RUNTIME_TARGET: x86_64-pc-windows-msvc
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CUDA
            backend: cuda
            cuda_architectures: '75;80;86;87;89;90'
            artifact_name: release-native-runtime-windows-x86_64-cuda12
          - name: ROCm
            backend: rocm
            rocm_architectures: gfx90a;gfx942;gfx1100;gfx1101;gfx1102;gfx1200;gfx1201
            artifact_name: release-native-runtime-windows-x86_64-rocm
          - name: Vulkan
            backend: vulkan
            artifact_name: release-native-runtime-windows-x86_64-vulkan
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Install CUDA toolkit
        if: ${{ matrix.backend == 'cuda' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.WINDOWS_CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'
          use-github-cache: true
          use-local-cache: true
          log-file-suffix: windows-cuda-native-runtime
      - name: Verify CUDA toolkit
        if: ${{ matrix.backend == 'cuda' }}
        shell: pwsh
        run: |
          if (-not $env:CUDA_PATH -or -not (Test-Path $env:CUDA_PATH)) {
            throw "CUDA_PATH was not configured by Jimver/cuda-toolkit."
          }
          & nvcc --version
      - name: Initialize MSVC for CUDA
        if: ${{ matrix.backend == 'cuda' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install backend SDK
        if: ${{ matrix.backend != 'cuda' }}
        shell: pwsh
        run: |
          .\scripts\install-windows-sdk.ps1 `
            -Backend "${{ matrix.backend }}" `
            -RocmHipSdkFilename "$env:ROCM_HIP_SDK_FILENAME" `
            -InstallerCacheDir "$HOME\sdk-installer-cache"
      - name: Package native runtime
        shell: bash
        env:
          LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
          LLAMA_STAGE_CUDA_ARCHITECTURES: ${{ matrix.cuda_architectures }}
          LLAMA_STAGE_AMDGPU_TARGETS: ${{ matrix.rocm_architectures }}
          MESH_LLM_CUDA_TOOLKIT_MAJOR: '12'
        run: |
          scripts/package-native-runtime.sh \
            --build \
            --backend "${{ matrix.backend }}" \
            --target x86_64-pc-windows-msvc \
            --out dist/native-runtimes
      - name: Verify native runtime artifact
        shell: bash
        run: scripts/verify-native-runtime-package.sh dist/native-runtimes/*.tar.gz
      - name: Upload native runtime
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/native-runtimes/*.tar.gz
            dist/native-runtimes/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - metadata
      - build
      - inference_smoke_tests
      - build_native_sdk_runtime
      - build_native_runtime
      - build_native_runtime_linux_aarch64_cuda
      - build_native_runtime_linux_x86_64_cuda
      - build_native_runtime_linux_x86_64_rocm
      - build_native_runtime_linux_x86_64_vulkan
      - build_swift_sdk_artifact
      - build_linux_arm64
      - smoke_linux_arm64_artifact
      - build_linux_aarch64_cuda
      - build_linux_cuda
      - build_linux_rocm
      - build_linux_vulkan
      - build_windows_cpu
      - build_windows_gpu
      - build_native_runtime_windows_cpu
      - build_native_runtime_windows_gpu
    if: ${{ always() && needs.metadata.result == 'success' && needs.metadata.outputs.canary != 'true' && needs.build.result == 'success' && needs.inference_smoke_tests.result == 'success' && needs.build_native_sdk_runtime.result == 'success' && needs.build_native_runtime.result == 'success' && (needs.build_native_runtime_linux_aarch64_cuda.result == 'success' || needs.build_native_runtime_linux_aarch64_cuda.result == 'skipped') && (needs.build_native_runtime_linux_x86_64_cuda.result == 'success' || needs.build_native_runtime_linux_x86_64_cuda.result == 'skipped') && (needs.build_native_runtime_linux_x86_64_rocm.result == 'success' || needs.build_native_runtime_linux_x86_64_rocm.result == 'skipped') && (needs.build_native_runtime_linux_x86_64_vulkan.result == 'success' || needs.build_native_runtime_linux_x86_64_vulkan.result == 'skipped') && needs.build_swift_sdk_artifact.result == 'success' && needs.build_linux_arm64.result == 'success' && needs.smoke_linux_arm64_artifact.result == 'success' && (needs.build_linux_aarch64_cuda.result == 'success' || needs.build_linux_aarch64_cuda.result == 'skipped') && (needs.build_linux_cuda.result == 'success' || needs.build_linux_cuda.result == 'skipped') && (needs.build_linux_rocm.result == 'success' || needs.build_linux_rocm.result == 'skipped') && (needs.build_linux_vulkan.result == 'success' || needs.build_linux_vulkan.result == 'skipped') && needs.build_windows_cpu.result == 'success' && (needs.build_windows_gpu.result == 'success' || needs.build_windows_gpu.result == 'skipped') && needs.build_native_runtime_windows_cpu.result == 'success' && (needs.build_native_runtime_windows_gpu.result == 'success' || needs.build_native_runtime_windows_gpu.result == 'skipped') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          version: 10

      - uses: actions/setup-node@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        if: github.event_name == 'workflow_dispatch'

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Remove smoke-only binary
        run: rm -f release-artifacts/mesh-llm

      - name: Generate native runtime release manifest
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          SKIP_GPU_BUNDLES: ${{ needs.metadata.outputs.skip_gpu_bundles }}
        run: |
          scripts/generate-native-runtime-release-manifest.sh \
            --tag "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --out release-artifacts/native-runtimes.json \
            release-artifacts/meshllm-native-runtime-*.tar.gz
          required_native_targets=(
            "macos/aarch64/metal"
            "linux/x86_64/cpu"
            "linux/aarch64/cpu"
            "windows/x86_64/cpu"
          )
          if [[ "$SKIP_GPU_BUNDLES" != "true" ]]; then
            required_native_targets+=(
              "linux/aarch64/cuda12"
              "linux/aarch64/cuda13"
              "linux/x86_64/cuda12"
              "linux/x86_64/cuda13"
              "linux/x86_64/rocm"
              "linux/x86_64/vulkan"
              "windows/x86_64/cuda12"
              "windows/x86_64/rocm"
              "windows/x86_64/vulkan"
            )
          fi
          validator_args=(--manifest release-artifacts/native-runtimes.json)
          for target in "${required_native_targets[@]}"; do
            validator_args+=(--required-target "$target")
          done
          scripts/validate-release-native-runtime-matrix.py \
            "${validator_args[@]}" \
            release-artifacts/*
          shasum -a 256 release-artifacts/native-runtimes.json | awk '{print $1 "  native-runtimes.json"}' > release-artifacts/native-runtimes.json.sha256

      - name: Download generated SwiftPM manifest
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v7
        with:
          name: swift-package-manifest
          path: generated-swift-manifest

      - name: Create dispatched release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $RELEASE_TAG; reusing it"
            exit 0
          fi
          scripts/release-version.sh "$RELEASE_TAG"
          cp generated-swift-manifest/Package.swift Package.swift
          scripts/package-sdk-console-assets.sh --sdk all
          scripts/verify-sdk-console-assets.sh --sdk all
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # release-version.sh owns the complete tracked version surface. Stage
          # all tracked release-preparation changes so this list cannot drift
          # when another version-bearing file is added to the script.
          git add --update
          git add -f sdk/node/console sdk/swift/Sources/MeshLLM/Resources/Console sdk/kotlin/src/main/resources/mesh-llm/console
          if ! git diff --quiet; then
            echo "Release preparation left unstaged tracked changes:" >&2
            git status --short >&2
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "Release source files already match $RELEASE_TAG"
          else
            git commit -m "$RELEASE_TAG: prepare release source"
          fi
          git tag "$RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          prerelease: ${{ needs.metadata.outputs.prerelease }}
          overwrite_files: true
          files: release-artifacts/*

  dispatch_packaging_release:
    name: Dispatch package and image publishing
    needs: [metadata, publish]
    if: ${{ needs.publish.result == 'success' && needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Dispatch verified release to mesh-agent-images
        env:
          GH_TOKEN: ${{ secrets.MESH_AGENT_IMAGES_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          [[ -n "${GH_TOKEN:-}" ]] || {
            echo "MESH_AGENT_IMAGES_DISPATCH_TOKEN is required for cross-repository packaging" >&2
            exit 1
          }
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg ref "$RELEASE_TAG" \
            --arg version "$RELEASE_VERSION" \
            '{
              event_type: "mesh-llm-release",
              client_payload: {
                repository: $repository,
                ref: $ref,
                version: $version,
                dry_run: false,
                publish_images: true,
                publish_release_assets: true
              }
            }' |
            gh api \
              --method POST \
              repos/Mesh-LLM/mesh-agent-images/dispatches \
              --input -

  publish_crates_preflight:
    name: Preflight crates.io packages
    needs: [metadata, publish]
    if: ${{ needs.metadata.outputs.prerelease != 'true' && needs.metadata.outputs.canary != 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Check crates.io publish-chain consistency
        run: cargo run -p xtask -- repo-consistency publish-crates
      - name: Dry-run crates.io package chain
        run: scripts/publish-crates.sh --dry-run --allow-dirty --sleep-seconds 0

  publish_crates:
    name: Publish crates.io packages
    needs: [metadata, publish, publish_crates_preflight]
    if: ${{ needs.metadata.outputs.prerelease != 'true' && needs.metadata.outputs.canary != 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Publish crates.io package chain
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: scripts/publish-crates.sh
