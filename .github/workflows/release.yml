  smoke_linux_arm64_artifact:
    name: Smoke Linux ARM64 artifact
    needs: [metadata, build_linux_arm64]
    if: ${{ needs.build_linux_arm64.result == 'success' }}
    runs-on: ${{ fromJson(vars.USE_SELF_HOSTED == 'true' && '["self-hosted","Linux","ARM64"]' || '["ubuntu-24.04-arm"]') }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: release-linux-arm64
          path: release-linux-arm64
      - name: Verify and smoke ARM64 release artifact
        env:
          EXPECTED_VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          cd release-linux-arm64
          tarball="mesh-llm-aarch64-unknown-linux-gnu.tar.gz"
          if [[ ! -f "$tarball" ]]; then
            echo "missing expected ARM64 release archive: $tarball" >&2
            find . -maxdepth 1 -type f -print | sort >&2
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1 && [[ -f "$tarball.sha256" ]]; then
            sha256sum -c "$tarball.sha256"
          fi
          mkdir -p smoke
          tar -xzf "$tarball" -C smoke
          binary="smoke/mesh-bundle/mesh-llm"
          version_output="$("$binary" --version)"
          actual_version="$(awk '{print $NF}' <<<"$version_output")"
          if [[ "$actual_version" != "$EXPECTED_VERSION" ]]; then
            echo "ARM64 artifact version mismatch: expected $EXPECTED_VERSION, got ${actual_version:-<empty>}" >&2
            echo "Output: $version_output" >&2
            exit 1
          fi
          "$binary" --help | head -5
          "$binary" runtime --help | head -20

