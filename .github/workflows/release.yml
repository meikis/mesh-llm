  build_windows_gpu:
    name: Build Windows ${{ matrix.name }}
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: windows-2022
    env:
      ROCM_HIP_SDK_FILENAME: AMD-Software-PRO-Edition-25.Q3-WinSvr2022-For-HIP.exe
      # Pin Windows CUDA to a version sccache 0.15.0 supports.
      # `choco install cuda` (used previously via install-windows-sdk.ps1)
      # pulls latest = CUDA 13.2, which deterministically crashes sccache
      # on nvcc output (see mozilla/sccache#2470). CI pins to the same
      # version via Jimver/cuda-toolkit; mirror that here.
      WINDOWS_CUDA_VERSION: ${{ vars.CUDA_VERSION || '12.9.2' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CUDA
            backend: cuda
            build_recipe: release-build-cuda-windows
            bundle_recipe: release-bundle-cuda-windows
            artifact_name: release-windows-cuda
          - name: ROCm
            backend: rocm
            build_recipe: release-build-rocm-windows
            bundle_recipe: release-bundle-rocm-windows
            artifact_name: release-windows-rocm
          - name: Vulkan
            backend: vulkan
            build_recipe: release-build-vulkan-windows
            bundle_recipe: release-bundle-vulkan-windows
            artifact_name: release-windows-vulkan
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Install CUDA toolkit
        if: ${{ matrix.backend == 'cuda' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.WINDOWS_CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'
          use-github-cache: true
          use-local-cache: true
          log-file-suffix: windows-cuda-release
      - name: Verify CUDA toolkit
        if: ${{ matrix.backend == 'cuda' }}
        shell: pwsh
        run: |
          if (-not $env:CUDA_PATH -or -not (Test-Path $env:CUDA_PATH)) {
            throw "CUDA_PATH was not configured by Jimver/cuda-toolkit."
          }
          & nvcc --version
      - name: Install backend SDK
        if: ${{ matrix.backend != 'cuda' }}
        shell: pwsh
        run: |
          .\scripts\install-windows-sdk.ps1 `
            -Backend "${{ matrix.backend }}" `
            -RocmHipSdkFilename "$env:ROCM_HIP_SDK_FILENAME" `
            -InstallerCacheDir "$HOME\sdk-installer-cache"
      - name: Build Windows GPU release bundle
        shell: pwsh
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          MESH_LLM_REQUIRE_SCCACHE: "1"
          MESH_LLM_WINDOWS_BUILD_JOBS: ${{ matrix.backend == 'cuda' && '1' || '' }}
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          Set-Content -Path $env:MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE -Value $env:RELEASE_ATTESTATION_SIGNING_KEY -NoNewline
          Set-Content -Path $env:MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE -Value $env:RELEASE_ATTESTATION_PUBLIC_KEY -NoNewline
          just ${{ matrix.build_recipe }}
          just ${{ matrix.bundle_recipe }} "$env:RELEASE_TAG" dist
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

