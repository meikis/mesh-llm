name: Release

# Set USE_SELF_HOSTED=true to route x86_64 CUDA release jobs and ARM64 smoke
# validation to self-hosted runners; unset or false uses GitHub-hosted runners.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version/tag to build, for example v0.31.0
        required: true
        type: string
      skip_gpu_bundles:
        description: Skip CUDA, CUDA Blackwell, ROCm, and Vulkan release bundles
        required: true
        default: false
        type: boolean
      canary:
        description: Dry-run mode — build + smoke everything but skip actual publishing
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  CACHE_NAMESPACE: mesh-llm
  SCCACHE_GHA_ENABLED: "true"

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      skip_gpu_bundles: ${{ steps.meta.outputs.skip_gpu_bundles }}
      canary: ${{ steps.meta.outputs.canary }}
    steps:
      - id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SKIP_GPU_BUNDLES: ${{ inputs.skip_gpu_bundles || 'false' }}
          INPUT_CANARY: ${{ inputs.canary || 'false' }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_VERSION}"
          fi
          tag="v${tag#v}"
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $tag" >&2
            exit 1
          fi
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "prerelease=$prerelease"
            echo "skip_gpu_bundles=$INPUT_SKIP_GPU_BUNDLES"
            echo "canary=$INPUT_CANARY"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64 Metal
            os: macos-15
            artifact_name: release-macos
            build_recipe: release-build
            bundle_recipe: release-bundle
            backend: metal
          - name: Linux x86_64 CPU
            os: ubuntu-24.04
            artifact_name: release-linux
            build_recipe: release-build
            bundle_recipe: release-bundle
            backend: cpu
    env:
      LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja lld

      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"

      - name: Build release bundle
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          printf '%s' "$RELEASE_ATTESTATION_SIGNING_KEY" > "$MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE"
          printf '%s' "$RELEASE_ATTESTATION_PUBLIC_KEY" > "$MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE"
          just --shell bash --shell-arg -c ${{ matrix.build_recipe }}
          just --shell bash --shell-arg -c ${{ matrix.bundle_recipe }} "$RELEASE_TAG" dist

      - name: Upload release bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload Linux smoke binary
        if: matrix.artifact_name == 'release-linux'
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          tar -xzf dist/mesh-llm-x86_64-unknown-linux-gnu.tar.gz -C "$tmp_dir"
          cp "$tmp_dir/mesh-bundle/mesh-llm" dist/mesh-llm

      - name: Upload Linux smoke binary artifact
        if: matrix.artifact_name == 'release-linux'
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-inference-binary
          path: dist/mesh-llm
          if-no-files-found: error

  inference_smoke_tests:
    needs: [metadata, build]
    if: needs.build.result == 'success'
    uses: ./.github/workflows/smoke.yml
    with:
      artifact_name: release-linux-inference-binary
      mesh_binary_target: target/release/mesh-llm
      cache_key_prefix: release-
      release_tag: ${{ needs.metadata.outputs.tag }}
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

  build_native_sdk_runtime:
    name: Build native SDK runtime ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64 Metal
            os: macos-15
            backend: metal
            target: aarch64-apple-darwin
            artifact_suffix: darwin-aarch64-metal
          - name: Linux x86_64 CPU
            os: ubuntu-24.04
            backend: cpu
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64-cpu
          - name: Linux aarch64 CPU
            os: ubuntu-24.04-arm
            backend: cpu
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-aarch64-cpu
    env:
      LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
      MESH_NATIVE_SDK_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja lld

      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"

      - name: Package native SDK runtime
        run: |
          scripts/package-native-sdk.sh \
            --build \
            --backend "${{ matrix.backend }}" \
            --target "${{ matrix.target }}" \
            --out dist/native-sdk

      - name: Verify native SDK runtime artifact
        run: scripts/verify-native-sdk-package.sh dist/native-sdk/*.tar.gz

      - name: Package native SDK runtime crate
        run: scripts/package-native-sdk-crate.sh --out dist/native-sdk-crates dist/native-sdk/*.tar.gz

      - name: Upload native SDK runtime
        uses: actions/upload-artifact@v6
        with:
          name: release-native-sdk-${{ matrix.artifact_suffix }}
          path: |
            dist/native-sdk/*.tar.gz
            dist/native-sdk/*.sha256
            dist/native-sdk-crates/*/target/package/*.crate
          if-no-files-found: error

  build_native_runtime:
    name: Build native runtime ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64 Metal
            os: macos-15
            backend: metal
            target: aarch64-apple-darwin
            artifact_suffix: darwin-aarch64-metal
          - name: Linux x86_64 CPU
            os: ubuntu-24.04
            backend: cpu
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64-cpu
          - name: Linux aarch64 CPU
            os: ubuntu-24.04-arm
            backend: cpu
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-aarch64-cpu
    env:
      LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
      MESH_NATIVE_RUNTIME_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl lld patchelf

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja lld

      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"

      - name: Package native runtime
        run: |
          scripts/package-native-runtime.sh \
            --build \
            --backend "${{ matrix.backend }}" \
            --target "${{ matrix.target }}" \
            --out dist/native-runtimes

      - name: Verify native runtime artifact
        run: scripts/verify-native-runtime-package.sh dist/native-runtimes/*.tar.gz

      - name: Upload native runtime
        uses: actions/upload-artifact@v6
        with:
          name: release-native-runtime-${{ matrix.artifact_suffix }}
          path: |
            dist/native-runtimes/*.tar.gz
            dist/native-runtimes/*.sha256
          if-no-files-found: error

  build_native_runtime_linux_aarch64_cuda:
    name: Build native runtime Linux aarch64 CUDA (${{ matrix.cuda_major }})
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: '12.9.2'
            cuda_major: '12'
          - cuda_version: '13.1.2'
            cuda_major: '13'
    container:
      image: nvidia/cuda:${{ matrix.cuda_version }}-devel-ubuntu24.04
    env:
      LLAMA_STAGE_BACKEND: cuda
      MESH_NATIVE_RUNTIME_TARGET: aarch64-unknown-linux-gnu
      MESH_LLM_CUDA_TOOLKIT_MAJOR: ${{ matrix.cuda_major }}
    steps:
      - name: Install base packages
        run: |
          for attempt in 1 2 3; do
            apt-get -o Acquire::Retries=5 update &&
              DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retries=5 install -y --fix-missing ca-certificates curl git cmake ninja-build pkg-config libssl-dev libdbus-1-dev python3 build-essential lld patchelf &&
              break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Package native runtime
        run: |
          scripts/package-native-runtime.sh \
            --build \
            --backend cuda \
            --target aarch64-unknown-linux-gnu \
            --out dist/native-runtimes
      - name: Verify native runtime artifact
        run: scripts/verify-native-runtime-package.sh dist/native-runtimes/*.tar.gz
      - name: Upload native runtime
        uses: actions/upload-artifact@v6
        with:
          name: release-native-runtime-linux-aarch64-cuda-${{ matrix.cuda_major }}
          path: |
            dist/native-runtimes/*.tar.gz
            dist/native-runtimes/*.sha256
          if-no-files-found: error

  build_native_runtime_linux_x86_64_cuda:
    name: Build native runtime Linux x86_64 CUDA (${{ matrix.cuda_major }})
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: ${{ fromJson(vars.USE_SELF_HOSTED == 'true' && '["self-hosted","Linux","X64","amd64","gpu-nvidia"]' || '["ubuntu-24.04"]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: '12.9.2'
            cuda_major: '12'
            cuda_architectures: '75;80;86;87;89;90'
            cuda_architectures_cache: '75_80_86_87_89_90'
          - cuda_version: '13.1.2'
            cuda_major: '13'
            cuda_architectures: '75;80;86;87;89;90;100;103;120;121'
            cuda_architectures_cache: '75_80_86_87_89_90_100_103_120_121'
    container:
      image: nvidia/cuda:${{ matrix.cuda_version }}-devel-ubuntu24.04
    env:
      LLAMA_STAGE_BACKEND: cuda
      LLAMA_STAGE_CUDA_ARCHITECTURES: ${{ matrix.cuda_architectures }}
      LLAMA_STAGE_BUILD_DIR: .deps/llama-build/build-stage-abi-dynamic-cuda-sm${{ matrix.cuda_architectures_cache }}
      MESH_NATIVE_RUNTIME_TARGET: x86_64-unknown-linux-gnu
      MESH_LLM_CUDA_TOOLKIT_MAJOR: ${{ matrix.cuda_major }}
    steps:
      - name: Install base packages
        run: |
          for attempt in 1 2 3; do
            apt-get -o Acquire::Retries=5 update &&
              DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retries=5 install -y --fix-missing ca-certificates curl git cmake ninja-build pkg-config libssl-dev libdbus-1-dev python3 build-essential lld patchelf &&
              break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache native runtime CUDA backend build
        uses: actions/cache@v5
        with:
          path: ${{ env.LLAMA_STAGE_BUILD_DIR }}
          key: ${{ env.CACHE_NAMESPACE }}-release-llama-linux-x86_64-cuda${{ matrix.cuda_major }}-${{ matrix.cuda_version }}-dynamic-${{ matrix.cuda_architectures_cache }}-${{ hashFiles('scripts/build-llama.sh', 'scripts/prepare-llama.sh', 'scripts/package-native-runtime.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', '.github/cache-version.txt') }}
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Package native runtime
        run: |
          scripts/package-native-runtime.sh \
            --build \
            --backend cuda \
            --target x86_64-unknown-linux-gnu \
            --out dist/native-runtimes
      - name: Verify native runtime artifact
        run: scripts/verify-native-runtime-package.sh dist/native-runtimes/*.tar.gz
      - name: Upload native runtime
        uses: actions/upload-artifact@v6
        with:
          name: release-native-runtime-linux-x86_64-cuda-${{ matrix.cuda_major }}
          path: |
            dist/native-runtimes/*.tar.gz
            dist/native-runtimes/*.sha256
          if-no-files-found: error

  build_native_runtime_linux_x86_64_rocm:
    name: Build native runtime Linux x86_64 ROCm
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: ubuntu-24.04
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete
    env:
      LLAMA_STAGE_BACKEND: rocm
      LLAMA_STAGE_AMDGPU_TARGETS: gfx90a;gfx942;gfx1100;gfx1101;gfx1102;gfx1200;gfx1201
      LLAMA_STAGE_BUILD_DIR: .deps/llama-build/build-stage-abi-dynamic-rocm-gfx90a_gfx942_gfx1100_gfx1101_gfx1102_gfx1200_gfx1201
      MESH_NATIVE_RUNTIME_TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Install base packages
        run: |
          for attempt in 1 2 3; do
            apt-get -o Acquire::Retries=5 update &&
              DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retries=5 install -y --fix-missing ca-certificates curl git cmake ninja-build pkg-config libssl-dev libdbus-1-dev python3 build-essential lld patchelf &&
              break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache native runtime ROCm backend build
        uses: actions/cache@v5
        with:
          path: ${{ env.LLAMA_STAGE_BUILD_DIR }}
          key: ${{ env.CACHE_NAMESPACE }}-release-llama-linux-x86_64-rocm7.0-dynamic-gfx90a_gfx942_gfx1100_gfx1101_gfx1102_gfx1200_gfx1201-${{ hashFiles('scripts/build-llama.sh', 'scripts/prepare-llama.sh', 'scripts/package-native-runtime.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', '.github/cache-version.txt') }}
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Package native runtime
        run: |
          scripts/package-native-runtime.sh \
            --build \
            --backend rocm \
            --target x86_64-unknown-linux-gnu \
            --out dist/native-runtimes
      - name: Verify native runtime artifact
        run: scripts/verify-native-runtime-package.sh dist/native-runtimes/*.tar.gz
      - name: Upload native runtime
        uses: actions/upload-artifact@v6
        with:
          name: release-native-runtime-linux-x86_64-rocm
          path: |
            dist/native-runtimes/*.tar.gz
            dist/native-runtimes/*.sha256
          if-no-files-found: error

  build_native_runtime_linux_x86_64_vulkan:
    name: Build native runtime Linux x86_64 Vulkan
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: ubuntu-24.04
    env:
      LLAMA_STAGE_BACKEND: vulkan
      LLAMA_STAGE_BUILD_DIR: .deps/llama-build/build-stage-abi-dynamic-vulkan
      MESH_NATIVE_RUNTIME_TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl python3 glslc libvulkan-dev spirv-headers lld patchelf
      - name: Cache native runtime Vulkan backend build
        uses: actions/cache@v5
        with:
          path: ${{ env.LLAMA_STAGE_BUILD_DIR }}
          key: ${{ env.CACHE_NAMESPACE }}-release-llama-linux-x86_64-vulkan-dynamic-${{ hashFiles('scripts/build-llama.sh', 'scripts/prepare-llama.sh', 'scripts/package-native-runtime.sh', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', '.github/cache-version.txt') }}
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Package native runtime
        run: |
          scripts/package-native-runtime.sh \
            --build \
            --backend vulkan \
            --target x86_64-unknown-linux-gnu \
            --out dist/native-runtimes
      - name: Verify native runtime artifact
        run: scripts/verify-native-runtime-package.sh dist/native-runtimes/*.tar.gz
      - name: Upload native runtime
        uses: actions/upload-artifact@v6
        with:
          name: release-native-runtime-linux-x86_64-vulkan
          path: |
            dist/native-runtimes/*.tar.gz
            dist/native-runtimes/*.sha256
          if-no-files-found: error

  build_swift_sdk_artifact:
    name: Build Swift SDK XCFramework
    needs: metadata
    runs-on: macos-15
    env:
      LLAMA_STAGE_BACKEND: metal
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install macOS dependencies
        run: brew install cmake ninja lld

      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"

      - name: Prepare Swift console resources
        run: |
          scripts/package-sdk-console-assets.sh --sdk swift
          scripts/verify-sdk-console-assets.sh --sdk swift

      - name: Verify tagged Swift console resources
        if: github.event_name != 'workflow_dispatch'
        run: git ls-files --error-unmatch sdk/swift/Sources/MeshLLM/Resources/Console/index.html

      - name: Build SwiftPM binary artifact
        run: |
          sdk/swift/scripts/build-xcframework.sh
          mkdir -p dist
          rm -f dist/MeshLLMFFI.xcframework.zip
          ditto -c -k --sequesterRsrc --keepParent \
            sdk/swift/Generated/MeshLLMFFI.xcframework \
            dist/MeshLLMFFI.xcframework.zip

      - name: Prepare SwiftPM manifest for dispatched release
        if: github.event_name == 'workflow_dispatch'
        run: |
          scripts/update-swift-package-manifest.sh \
            "${{ needs.metadata.outputs.tag }}" \
            dist/MeshLLMFFI.xcframework.zip

      - name: Verify SwiftPM binary artifact
        run: |
          scripts/verify-swift-release-artifact.sh dist/MeshLLMFFI.xcframework.zip
          scripts/verify-swift-package-manifest.sh \
            "${{ needs.metadata.outputs.tag }}" \
            dist/MeshLLMFFI.xcframework.zip

      - name: Upload generated SwiftPM manifest
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: swift-package-manifest
          path: Package.swift
          if-no-files-found: error

      - name: Upload SwiftPM binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-swift-sdk
          path: dist/MeshLLMFFI.xcframework.zip
          if-no-files-found: error

  build_linux_arm64:
    name: Build Linux ARM64 CPU
    needs: metadata
    runs-on: ubuntu-24.04-arm
    env:
