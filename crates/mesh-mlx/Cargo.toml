[package]
name = "mesh-mlx"
edition.workspace = true
license.workspace = true
version.workspace = true
description = "Native Rust MLX runtime: model forward passes, loading, generation, and distributed (pipeline/tensor) inference over mlx-c. No Python, no Swift."
repository = "https://github.com/Mesh-LLM/mesh-llm"
homepage = "https://github.com/Mesh-LLM/mesh-llm"

[features]
default = []
# Link the native MLX engine and enable real inference / distributed execution.
link-mlx = ["mesh-mlx-sys/link-mlx"]

[dependencies]
mesh-mlx-sys = { path = "../mesh-mlx-sys", version = "0.68.0" }
anyhow.workspace = true
thiserror = "2"
serde.workspace = true
serde_json.workspace = true
tracing = "0.1"
model-hf = { path = "../model-hf", version = "0.68.0" }
tokenizers = { version = "0.20", default-features = false, features = ["onig"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "fs"] }
axum = "0.8"

[dev-dependencies]
tempfile = "3"
