[package]
name = "model-fit"
edition.workspace = true
license.workspace = true
version.workspace = true
description = "Explainable hardware fit scoring for GGUF model artifacts"
repository = "https://github.com/Mesh-LLM/mesh-llm"
homepage = "https://github.com/Mesh-LLM/mesh-llm"

[features]
default = ["ggml-probe"]
ggml-probe = [
    "mesh-llm-gpu-bench/ggml-probe",
    "mesh-llm-system/gpu-bench-ggml",
]
cuda = [
    "mesh-llm-gpu-bench/cuda",
    "mesh-llm-system/gpu-bench-cuda",
]
rocm = [
    "mesh-llm-gpu-bench/hip",
    "mesh-llm-system/gpu-bench-hip",
]
hip = ["rocm"]
intel = [
    "mesh-llm-gpu-bench/intel",
    "mesh-llm-system/gpu-bench-intel",
]

[dependencies]
anyhow.workspace = true
mesh-llm-gpu-bench = { path = "../mesh-llm-gpu-bench", version = "0.68.0" }
mesh-llm-system = { path = "../mesh-llm-system", version = "0.68.0" }
model-artifact = { path = "../model-artifact", version = "0.68.0" }
model-hf = { path = "../model-hf", version = "0.68.0" }
model-ref = { path = "../model-ref", version = "0.68.0" }
model-resolver = { path = "../model-resolver", version = "0.68.0" }
serde.workspace = true
serde_json.workspace = true
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
