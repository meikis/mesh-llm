[package]
name = "model-package"
edition.workspace = true
license.workspace = true
version.workspace = true
description = "Model package manifest and materialization helpers for mesh-llm"
repository = "https://github.com/Mesh-LLM/mesh-llm"
homepage = "https://github.com/Mesh-LLM/mesh-llm"
readme = "README.md"

[build-dependencies]
sha2.workspace = true

[dependencies]
anyhow.workspace = true
bytes = "1"
chrono = "0.4"
hf_hub = { package = "hf-hub", version = "1.0.0-rc.1", default-features = false, features = ["blocking"] }
model-hf = { path = "../model-hf", version = "0.72.1"  }
model-ref = { path = "../model-ref", version = "0.72.1"  }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tokio = { version = "1", features = ["rt", "time"] }
futures = "0.3"
tempfile = "3"
