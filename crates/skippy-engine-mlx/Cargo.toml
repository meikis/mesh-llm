# MLX (Metal) serving engine for mesh-llm.
#
# Serves HF safetensors tensor models over mesh-llm's REAL OpenAI-compatible
# frontend (`openai-frontend::OpenAiBackend`), goose-style, on Apple Silicon.
#
# It depends on the MLX-in-Rust stack (safemlx / safemlx-lm) pinned to a specific
# PUBLIC commit of github.com/jbg/safemlx. This is a deliberate git-rev pin, not
# a private fork: safemlx's crates.io releases currently produce garbage output
# for dense models (Qwen3, Llama) — verified this to be a library bug, not a
# prompting/template issue — while a recent upstream commit serves them
# correctly. We pin that commit and will swap to a normal version pin once
# safemlx cuts a working release. See WIRING.md.
#
# The crate keeps its OWN `[workspace]` table for now so the heavy MLX native
# build (CMake + full MLX C++ compile) never runs in unrelated builds/CI.
# Promotion to a real workspace member is documented in WIRING.md.
[package]
name = "skippy-engine-mlx"
version = "0.0.0"
edition = "2021"
publish = false

[workspace]

[lib]
name = "skippy_engine_mlx"
path = "src/lib.rs"

[[bin]]
name = "mlx-serve"
path = "src/bin/mlx-serve.rs"

[features]
default = []
# Enable the real MLX engine. macOS-only in practice (code is cfg-gated to
# target_os = "macos"); the deps still resolve elsewhere but compile to nothing.
mlx = ["dep:safemlx", "dep:safemlx-lm", "dep:tokenizers"]

[dependencies]
# The real mesh-llm OpenAI frontend — this is what proves we serve over the
# same surface the shipped binary uses, not a toy.
openai-frontend = { path = "../openai-frontend" }
async-trait = "0.1"
async-stream = "0.3"
anyhow = "1"
axum = "0.8"
clap = { version = "4", features = ["derive"] }
futures-core = "0.3"
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# MLX stack — pinned to a specific PUBLIC commit of github.com/jbg/safemlx.
# See the header comment for why this is a git-rev pin rather than a crates.io
# version pin. Same feature set goose uses: accelerate + metal + safetensors.
safemlx = { git = "https://github.com/jbg/safemlx", rev = "4e53c5e", default-features = false, features = [
    "accelerate",
    "metal",
    "safetensors",
], optional = true }
safemlx-lm = { git = "https://github.com/jbg/safemlx", rev = "4e53c5e", optional = true }
# Standalone tokenizer for incremental (streaming) detokenization without
# borrowing the model. `onig` matches safemlx-lm so the build dedupes.
tokenizers = { version = "0.23", default-features = false, features = [
    "onig",
], optional = true }
