[package]
name = "skippy-server"
edition.workspace = true
license.workspace = true
version.workspace = true
description = "Embedded Skippy staged runtime server"
repository = "https://github.com/Mesh-LLM/mesh-llm"
homepage = "https://github.com/Mesh-LLM/mesh-llm"

[lib]
name = "skippy_server"
path = "src/lib.rs"

[features]
default = []
dynamic-native-runtime = ["skippy-runtime/dynamic-native-runtime"]

[dependencies]
anyhow.workspace = true
async-trait = "0.1"
axum = "0.8"
base64 = "0.22"
blake3.workspace = true
clap.workspace = true
futures-util = "0.3"
skippy-runtime = { path = "../skippy-runtime", version = "0.72.1"  }
skippy-protocol = { path = "../skippy-protocol", version = "0.72.1"  }
skippy-cache = { path = "../skippy-cache", version = "0.72.1"  }
skippy-metrics = { path = "../skippy-metrics", version = "0.72.1"  }
openai-frontend = { path = "../openai-frontend", version = "0.72.1"  }
opentelemetry-proto = "0.31.0"
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
socket2 = "0.6"
libc = "0.2"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread", "sync"] }
tokio-stream = "0.1"
tonic = "0.14"

[dev-dependencies]
tempfile = "3"
