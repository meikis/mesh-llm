[package]
name = "mlx-safetensors-stage-plan"
version = "0.0.0"
edition = "2024"
publish = false

[[bin]]
name = "mlx-safetensors-stage-plan"
path = "src/main.rs"

# Standalone research spike: keep HTTP dependencies and its lockfile out of the
# mesh-llm workspace while the stage-cache design is still being validated.
[workspace]

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

