# Fork-free variant: depends ONLY on crates.io (no path deps), to answer
# "can we do solo MLX serving without a fork?".
#
# Uses the goose-baseline path (plain LoadedModel::load) because the PUBLISHED
# safemlx-lm 0.4.1 does NOT expose the JIT-quant-on-load API (that lives only in
# the fork's unpublished HEAD). Own [workspace], not part of mesh-llm.
[package]
name = "mlx-solo-published"
version = "0.0.0"
edition = "2021"
publish = false

[[bin]]
name = "mlx-solo-published"
path = "src/main.rs"

[workspace]

[dependencies]
# Pure crates.io. safemlx 0.1.3 default features include metal + accelerate.
safemlx = { version = "0.1.3", features = ["safetensors"] }
safemlx-lm = "0.4.1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde_json = "1"
